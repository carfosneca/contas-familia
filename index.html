<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a2f6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CM Finanças">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CM Finanças</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f2f2f7;color:#1c1c1e;-webkit-font-smoothing:antialiased}
body{padding-bottom:84px;min-height:100vh}
@media (prefers-color-scheme:dark){
  body{background:#000;color:#f2f2f7}
  .card,.modal-content{background:#1c1c1e!important;color:#f2f2f7}
  .item-row,.cat-row{border-color:#2c2c2e!important}
  .nav{background:rgba(28,28,30,.95)!important;border-color:#2c2c2e!important}
  .header{background:rgba(28,28,30,.95)!important;border-color:#2c2c2e!important}
  .muted{color:#8e8e93!important}
  .btn-secondary{background:#2c2c2e!important;color:#f2f2f7!important}
  input,select{background:#2c2c2e!important;color:#f2f2f7!important;border-color:#3a3a3c!important}
  .toggle{background:#2c2c2e!important}
  .toggle-btn.active{background:#1a2f6b!important;color:#fff!important}
}
.header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid #e5e5ea;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.title{font-size:17px;font-weight:600}
.subtitle{font-size:12px;color:#8e8e93;margin-top:2px}
.muted{color:#8e8e93;font-size:13px}
.container{padding:16px;max-width:600px;margin:0 auto}
.card{background:#fff;border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card-pad{padding:16px}
.month-selector{display:flex;gap:8px;overflow-x:auto;padding:4px 0;margin-bottom:12px;scrollbar-width:none}
.month-selector::-webkit-scrollbar{display:none}
.month-btn{padding:8px 16px;border-radius:20px;border:none;background:#e5e5ea;color:#1c1c1e;font-size:14px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s}
.month-btn.active{background:#1a2f6b;color:#fff}
@media (prefers-color-scheme:dark){.month-btn{background:#2c2c2e;color:#f2f2f7}}
.total-big{font-size:34px;font-weight:700;letter-spacing:-.5px}
.total-label{font-size:13px;color:#8e8e93;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.toggle{display:flex;background:#e5e5ea;border-radius:8px;padding:2px;margin:16px 0 12px}
.toggle-btn{flex:1;padding:8px;border:none;background:transparent;color:#8e8e93;font-size:14px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .15s}
.toggle-btn.active{background:#fff;color:#1c1c1e;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #e5e5ea;cursor:pointer}
.item-row:last-child{border-bottom:none}
.item-name{font-size:15px;flex:1}
.item-meta{font-size:12px;color:#8e8e93;margin-top:2px}
.item-value{font-size:15px;font-weight:500;text-align:right;white-space:nowrap;margin-left:12px}
.cat-row{padding:12px 16px;border-bottom:1px solid #e5e5ea;cursor:pointer}
.cat-row:last-child{border-bottom:none}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-name{font-size:15px;font-weight:500}
.cat-value{font-size:15px;font-weight:500}
.cat-bar{height:6px;background:#e5e5ea;border-radius:3px;overflow:hidden}
@media (prefers-color-scheme:dark){.cat-bar{background:#2c2c2e}}
.cat-fill{height:100%;border-radius:3px;transition:width .3s}
.cat-pct{font-size:12px;color:#8e8e93;margin-top:4px}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid #e5e5ea;display:flex;padding:8px 0 24px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px;background:none;border:none;color:#8e8e93;font-size:11px;cursor:pointer}
.nav-btn.active{color:#1a2f6b}
@media (prefers-color-scheme:dark){.nav-btn.active{color:#c9a84c}}
.nav-icon{font-size:22px}
.bars-container{display:flex;flex-direction:column;gap:10px;padding:8px 0}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:48px;font-size:13px;color:#8e8e93;font-weight:500}
.bar-track{flex:1;height:24px;background:#f2f2f7;border-radius:6px;overflow:hidden;display:flex;position:relative}
@media (prefers-color-scheme:dark){.bar-track{background:#2c2c2e}}
.bar-fix{background:#1a2f6b}
.bar-var{background:#c9a84c}
.bar-total{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.legend{display:flex;gap:16px;font-size:12px;color:#8e8e93;margin-top:8px;justify-content:center}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
table.heatmap{width:100%;border-collapse:collapse;font-size:12px}
table.heatmap th,table.heatmap td{padding:6px 4px;text-align:right;border-bottom:1px solid #e5e5ea}
table.heatmap th:first-child,table.heatmap td:first-child{text-align:left}
table.heatmap th{font-weight:500;color:#8e8e93;font-size:11px;text-transform:uppercase}
@media (prefers-color-scheme:dark){table.heatmap th,table.heatmap td{border-color:#2c2c2e}}
.section-title{font-size:13px;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px;margin:20px 16px 8px;font-weight:500}
.acerto-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #e5e5ea;cursor:pointer}
.acerto-row:last-child{border-bottom:none}
.acerto-info{flex:1}
.acerto-month{font-size:15px;font-weight:500}
.acerto-status{font-size:12px;margin-top:2px}
.status-q{color:#34c759}
.status-i{color:#8e8e93}
.status-p{color:#c9a84c}
.acerto-val{font-size:14px;text-align:right}
.acerto-lines{font-size:12px;color:#8e8e93;margin-top:4px;line-height:1.5}
.acerto-lines b{color:#1c1c1e;font-weight:500}
@media (prefers-color-scheme:dark){.acerto-lines b{color:#f2f2f7}}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
.modal-content{background:#fff;width:100%;max-width:500px;border-radius:16px 16px 0 0;padding:24px 20px 36px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:600}
.modal-close{background:none;border:none;font-size:24px;color:#8e8e93;cursor:pointer;padding:4px 8px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;color:#8e8e93;margin-bottom:6px;font-weight:500}
input,select{width:100%;padding:12px;border:1px solid #d1d1d6;border-radius:8px;font-size:16px;background:#fff;color:#1c1c1e;font-family:inherit}
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-primary{background:#1a2f6b;color:#fff}
.btn-secondary{background:#e5e5ea;color:#1c1c1e;margin-top:6px}
.detail-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.detail-card{background:#f2f2f7;padding:12px;border-radius:10px}
@media (prefers-color-scheme:dark){.detail-card{background:#2c2c2e}}
.detail-label{font-size:11px;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px}
.detail-val{font-size:18px;font-weight:600;margin-top:4px}
.empty{text-align:center;padding:32px;color:#8e8e93;font-size:14px}
.loading{text-align:center;padding:48px 16px;color:#8e8e93}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="header">
  <div>
    <div class="title">CM Finanças</div>
    <div class="subtitle">Carla &amp; Matheus</div>
  </div>
  <div id="header-right" class="muted"></div>
</div>

<div id="app" class="container">
  <div class="loading">Carregando...</div>
</div>

<nav class="nav">
  <button class="nav-btn active" data-tab="gastos"><span class="nav-icon">⊞</span>Gastos</button>
  <button class="nav-btn" data-tab="historico"><span class="nav-icon">📊</span>Histórico</button>
  <button class="nav-btn" data-tab="acerto"><span class="nav-icon">⚖️</span>Acerto</button>
</nav>

<script>
const fmt = v => 'R$ ' + Math.round(v).toLocaleString('pt-BR');
const STORAGE_KEY = 'cmf_quitacoes_v1';

let DADOS = null;
let state = {
  tab: 'gastos',
  mes: null,
  modo: 'variavel',
  detalheCategoria: null,
  modal: null,
  acertoMes: null,
};

// ===== QUITAÇÕES (localStorage) =====
function loadQuitacoes() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    console.error('Erro lendo quitações:', e);
    return {};
  }
}
function saveQuitacoes(q) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(q));
  } catch (e) {
    console.error('Erro salvando quitações:', e);
  }
}

// ===== SUPABASE =====
const SUPA_URL = 'https://anfyhkgcetegvcjxcbqr.supabase.co';
const SUPA_KEY = 'sb_publishable_j_VvBJxc6ZrplZMitRKprQ_JFlSiHqW';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ===== CARREGAR DADOS =====
async function init() {
  try {
    const [{ data: coresRows }, { data: mesesRows }, { data: fixosRows }, { data: itensRows }] = await Promise.all([
      supa.from('cores').select('*'),
      supa.from('meses').select('*'),
      supa.from('fixos').select('*'),
      supa.from('itens').select('*'),
    ]);

    const cores = {};
    for (const r of coresRows) cores[r.categoria] = r.cor;

    const mesesOrdem = mesesRows.map(r => r.mes);

    const dados = {};
    for (const r of mesesRows) {
      dados[r.mes] = {
        label: r.label,
        total: r.total,
        fix: r.fix,
        varr: r.varr,
        carlaPagou: r.carla_pagou,
        carlaDeve: r.carla_deve,
        matheusPagou: r.matheus_pagou,
        matheusDeve: r.matheus_deve,
        saldoCarla: r.saldo_carla,
        cartaoSplit: { matheus: r.cartao_matheus, carla: r.cartao_carla },
        fixos: [],
        cats: [],
      };
    }

    for (const f of fixosRows) {
      if (dados[f.mes]) dados[f.mes].fixos.push({ n: f.nome, p: f.pagante, v: f.valor });
    }

    const catMap = {};
    for (const it of itensRows) {
      const key = it.mes + '|' + it.categoria;
      if (!catMap[key]) catMap[key] = { n: it.categoria, v: 0, c: cores[it.categoria] || '#aaa', itens: [] };
      catMap[key].itens.push({ n: it.nome, p: it.pagante, v: it.valor });
      catMap[key].v += it.valor;
    }

    for (const [key, cat] of Object.entries(catMap)) {
      const mes = key.split('|')[0];
      if (dados[mes]) dados[mes].cats.push(cat);
    }

    for (const mes of mesesOrdem) {
      dados[mes].cats.sort((a, b) => b.v - a.v);
      for (const cat of dados[mes].cats) cat.itens.sort((a, b) => b.v - a.v);
    }

    DADOS = { meses: mesesOrdem, cores, dados };
    state.mes = mesesOrdem[mesesOrdem.length - 1];
    state.acertoMes = state.mes;
    render();
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="empty">Erro carregando dados: ' + e.message + '</div>';
  }
}

// ===== RENDER PRINCIPAL =====
function render() {
  // Nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === state.tab);
  });
  
  const app = document.getElementById('app');
  if (state.tab === 'gastos') app.innerHTML = renderGastos();
  else if (state.tab === 'historico') app.innerHTML = renderHistorico();
  else app.innerHTML = renderAcerto();
  
  // Header right
  const hr = document.getElementById('header-right');
  hr.textContent = state.tab === 'gastos' ? (DADOS.dados[state.mes]?.label || '') : '';
  
  attachHandlers();
}

// ===== TELA 1: GASTOS =====
function renderGastos() {
  const d = DADOS.dados[state.mes];
  if (!d) return '<div class="empty">Mês sem dados.</div>';
  
  const meses = DADOS.meses.map(m => 
    `<button class="month-btn ${m===state.mes?'active':''}" data-mes="${m}">${DADOS.dados[m].label}</button>`
  ).join('');
  
  const totalVarr = d.varr || 1;
  
  let conteudo = '';
  if (state.modo === 'fixo') {
    conteudo = d.fixos.map(f => `
      <div class="item-row">
        <div>
          <div class="item-name">${f.n}</div>
          <div class="item-meta">${f.p}</div>
        </div>
        <div class="item-value">${fmt(f.v)}</div>
      </div>
    `).join('');
  } else {
    conteudo = d.cats.map((c,i) => {
      const pct = Math.round((c.v / totalVarr) * 100);
      return `
        <div class="cat-row" data-cat="${i}">
          <div class="cat-header">
            <span class="cat-name">${c.n}</span>
            <span class="cat-value">${fmt(c.v)}</span>
          </div>
          <div class="cat-bar"><div class="cat-fill" style="width:${pct}%;background:${c.c}"></div></div>
          <div class="cat-pct">${pct}% · ${c.itens.length} ${c.itens.length===1?'item':'itens'}</div>
        </div>
      `;
    }).join('');
  }
  
  return `
    <div class="month-selector">${meses}</div>
    <div class="card card-pad">
      <div class="total-label">Total do mês</div>
      <div class="total-big">${fmt(d.total)}</div>
      <div class="toggle">
        <button class="toggle-btn ${state.modo==='fixo'?'active':''}" data-modo="fixo">Fixo · ${fmt(d.fix)}</button>
        <button class="toggle-btn ${state.modo==='variavel'?'active':''}" data-modo="variavel">Variável · ${fmt(d.varr)}</button>
      </div>
      <div class="muted" style="font-size:12px;text-align:center">
        ${state.modo==='fixo' ? 'proporção 40% Carla / 60% Matheus' : 'proporção 50% / 50%'}
      </div>
    </div>
    <div class="card">${conteudo}</div>
  `;
}

// ===== TELA 2: HISTÓRICO =====
function renderHistorico() {
  const meses = DADOS.meses;
  const maxTotal = Math.max(...meses.map(m => DADOS.dados[m].total));
  
  const bars = meses.map(m => {
    const d = DADOS.dados[m];
    const fixPct = (d.fix / maxTotal) * 100;
    const varPct = (d.varr / maxTotal) * 100;
    return `
      <div class="bar-row">
        <div class="bar-label">${d.label}</div>
        <div class="bar-track">
          <div class="bar-fix" style="width:${fixPct}%"></div>
          <div class="bar-var" style="width:${varPct}%"></div>
          <div class="bar-total">${fmt(d.total)}</div>
        </div>
      </div>
    `;
  }).join('');
  
  // Categorias por mês (% do variável)
  const todasCats = new Set();
  meses.forEach(m => DADOS.dados[m].cats.forEach(c => todasCats.add(c.n)));
  const catsArr = Array.from(todasCats);
  
  const thead = '<tr><th>Categoria</th>' + meses.map(m => `<th>${DADOS.dados[m].label.split('/')[0]}</th>`).join('') + '</tr>';
  
  const tbody = catsArr.map(cat => {
    const cells = meses.map(m => {
      const d = DADOS.dados[m];
      const c = d.cats.find(x => x.n === cat);
      if (!c) return '<td style="color:#8e8e93">–</td>';
      const pct = Math.round((c.v / d.varr) * 100);
      return `<td>${pct}%</td>`;
    }).join('');
    return `<tr><td>${cat}</td>${cells}</tr>`;
  }).join('');
  
  const totals = '<tr><td><b>Total var</b></td>' + meses.map(m => `<td><b>${fmt(DADOS.dados[m].varr)}</b></td>`).join('') + '</tr>';
  
  return `
    <div class="card card-pad">
      <div class="total-label">Histórico</div>
      <div style="font-size:13px;color:#8e8e93;margin-bottom:12px">${DADOS.dados[meses[0]].label} — ${DADOS.dados[meses[meses.length-1]].label}</div>
      <div class="bars-container">${bars}</div>
      <div class="legend">
        <span><span class="legend-dot" style="background:#1a2f6b"></span>Fixo</span>
        <span><span class="legend-dot" style="background:#c9a84c"></span>Variável</span>
      </div>
    </div>
    <div class="card card-pad">
      <div class="total-label">Variável por categoria</div>
      <div style="font-size:12px;color:#8e8e93;margin-bottom:10px">% do total variável por mês</div>
      <div style="overflow-x:auto">
        <table class="heatmap">
          <thead>${thead}</thead>
          <tbody>${tbody}${totals}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ===== TELA 3: ACERTO =====
function calcAcerto() {
  const quitacoes = loadQuitacoes();
  let acumulado = 0;
  const meses = DADOS.meses;
  const result = [];
  
  for (const m of meses) {
    const d = DADOS.dados[m];
    const saldoMes = d.saldoCarla; // negativo = Carla deve a Matheus
    const q = quitacoes[m]; // { valor, data, direcao } se quitado
    const totalAQuitar = saldoMes + acumulado;
    const incorporado = acumulado;
    
    if (q) {
      result.push({mes:m, label:d.label, status:'quitado', saldoMes, incorporado, totalAQuitar, quitacao:q});
      acumulado = 0;
    } else {
      // Se for o último mês, fica pendente. Senão, marca como "incorporado em próximo"
      const isLast = m === meses[meses.length-1];
      if (isLast) {
        result.push({mes:m, label:d.label, status:'pendente', saldoMes, incorporado, totalAQuitar});
      } else {
        result.push({mes:m, label:d.label, status:'incorporado', saldoMes, incorporado, totalAQuitar, proximo:meses[meses.indexOf(m)+1]});
      }
      acumulado = totalAQuitar;
    }
  }
  return result;
}

function renderAcerto() {
  const acerto = calcAcerto();
  
  const rows = acerto.map(a => {
    const lines = a.status === 'pendente' && a.incorporado !== 0 ? `
      <div class="acerto-lines">
        Saldo do mês: <b>${fmt(Math.abs(a.saldoMes))}</b> ${a.saldoMes<0?'Carla→Matheus':'Matheus→Carla'}<br>
        Incorporado: <b>${fmt(Math.abs(a.incorporado))}</b><br>
        Total a quitar: <b>${fmt(Math.abs(a.totalAQuitar))}</b>
      </div>
    ` : '';
    
    let statusTxt = '';
    let statusClass = '';
    let valor = '';
    
    if (a.status === 'quitado') {
      statusTxt = `✓ Quitado em ${a.quitacao.data}`;
      statusClass = 'status-q';
      valor = fmt(Math.abs(a.quitacao.valor)) + ' ' + a.quitacao.direcao;
    } else if (a.status === 'incorporado') {
      statusTxt = `→ Incorporado em ${DADOS.dados[a.proximo].label}`;
      statusClass = 'status-i';
      valor = fmt(Math.abs(a.saldoMes)) + ' ' + (a.saldoMes<0?'C→M':'M→C');
    } else {
      statusTxt = '⏳ Pendente';
      statusClass = 'status-p';
      valor = fmt(Math.abs(a.totalAQuitar)) + ' ' + (a.totalAQuitar<0?'C→M':'M→C');
    }
    
    return `
      <div class="acerto-row" data-mes="${a.mes}">
        <div class="acerto-info">
          <div class="acerto-month">${a.label}</div>
          <div class="acerto-status ${statusClass}">${statusTxt}</div>
          ${lines}
        </div>
        <div class="acerto-val">${valor}</div>
      </div>
    `;
  }).join('');
  
  return `
    <div class="card">
      <div style="padding:16px 16px 8px">
        <div class="total-label">Acerto de contas</div>
        <div style="font-size:12px;color:#8e8e93;margin-top:4px">Toque num mês para detalhes</div>
      </div>
      ${rows}
    </div>
  `;
}

// ===== HANDLERS =====
function attachHandlers() {
  // Nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.onclick = () => { state.tab = b.dataset.tab; render(); };
  });
  
  // Mês
  document.querySelectorAll('.month-btn').forEach(b => {
    b.onclick = () => { state.mes = b.dataset.mes; render(); };
  });
  
  // Toggle modo
  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.onclick = () => { state.modo = b.dataset.modo; render(); };
  });
  
  // Categoria → detalhe
  document.querySelectorAll('.cat-row').forEach(r => {
    r.onclick = () => {
      const idx = parseInt(r.dataset.cat);
      openModalDetalheCat(idx);
    };
  });
  
  // Acerto row → detalhe
  document.querySelectorAll('.acerto-row').forEach(r => {
    r.onclick = () => {
      state.acertoMes = r.dataset.mes;
      openModalAcerto(r.dataset.mes);
    };
  });
}

// ===== MODAIS =====
function openModalDetalheCat(idx) {
  const d = DADOS.dados[state.mes];
  const cat = d.cats[idx];
  if (!cat) return;
  
  const itens = cat.itens.map(it => `
    <div class="item-row">
      <div style="flex:1;min-width:0">
        <div class="item-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.n}</div>
        <div class="item-meta">${it.p}</div>
      </div>
      <div class="item-value" style="color:${it.v<0?'#34c759':'inherit'}">${it.v<0?'−':''}${fmt(Math.abs(it.v))}</div>
    </div>
  `).join('');
  
  const html = `
    <div class="modal" id="cmf-modal">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <div class="modal-title">${cat.n}</div>
            <div class="muted" style="font-size:13px;margin-top:2px">${d.label} · ${fmt(cat.v)} · ${cat.itens.length} itens</div>
          </div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        ${itens || '<div class="empty">Sem itens.</div>'}
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
}

function openModalAcerto(mesId) {
  const d = DADOS.dados[mesId];
  const acerto = calcAcerto().find(a => a.mes === mesId);
  if (!d || !acerto) return;
  
  const carlaCor = d.saldoCarla >= 0 ? '#34c759' : '#ff3b30';
  const matheusCor = d.saldoCarla >= 0 ? '#ff3b30' : '#34c759';
  
  let acoes = '';
  if (acerto.status === 'quitado') {
    acoes = `
      <div class="muted" style="text-align:center;padding:12px">
        ✓ Quitado em ${acerto.quitacao.data}<br>
        ${fmt(Math.abs(acerto.quitacao.valor))} · ${acerto.quitacao.direcao}
      </div>
      <button class="btn btn-secondary" onclick="removerQuitacao('${mesId}')">Remover quitação</button>
    `;
  } else if (acerto.status === 'pendente') {
    acoes = `<button class="btn btn-primary" onclick="abrirQuitacao('${mesId}')">Registrar quitação</button>`;
  } else {
    acoes = `<div class="muted" style="text-align:center;padding:12px">Saldo incorporado em ${DADOS.dados[acerto.proximo].label}</div>`;
  }
  
  const html = `
    <div class="modal" id="cmf-modal">
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-title">${d.label}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="detail-summary">
          <div class="detail-card">
            <div class="detail-label">Carla pagou</div>
            <div class="detail-val">${fmt(d.carlaPagou)}</div>
            <div class="muted" style="font-size:12px;margin-top:4px">Deveria: ${fmt(d.carlaDeve)}</div>
            <div style="color:${carlaCor};font-size:13px;font-weight:600;margin-top:4px">
              ${d.saldoCarla>=0?'+':'−'}${fmt(Math.abs(d.saldoCarla))}
            </div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Matheus pagou</div>
            <div class="detail-val">${fmt(d.matheusPagou)}</div>
            <div class="muted" style="font-size:12px;margin-top:4px">Deveria: ${fmt(d.matheusDeve)}</div>
            <div style="color:${matheusCor};font-size:13px;font-weight:600;margin-top:4px">
              ${-d.saldoCarla>=0?'+':'−'}${fmt(Math.abs(d.saldoCarla))}
            </div>
          </div>
        </div>
        ${acerto.incorporado !== 0 ? `
          <div class="detail-card" style="margin-bottom:16px">
            <div class="detail-label">Incorporado de meses anteriores</div>
            <div class="detail-val" style="font-size:15px">${fmt(Math.abs(acerto.incorporado))} ${acerto.incorporado<0?'C→M':'M→C'}</div>
          </div>
        ` : ''}
        ${acoes}
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
}

function abrirQuitacao(mesId) {
  closeModal();
  const acerto = calcAcerto().find(a => a.mes === mesId);
  if (!acerto) return;
  const valor = Math.abs(acerto.totalAQuitar);
  const direcao = acerto.totalAQuitar < 0 ? 'Carla → Matheus' : 'Matheus → Carla';
  const hoje = new Date().toISOString().slice(0,10);
  
  const html = `
    <div class="modal" id="cmf-modal">
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-title">Registrar quitação</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="muted" style="margin-bottom:16px">${DADOS.dados[mesId].label}</div>
        <div class="form-group">
          <label class="form-label">Valor (R$)</label>
          <input type="number" id="q-valor" value="${valor}" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label">Data</label>
          <input type="date" id="q-data" value="${hoje}">
        </div>
        <div class="form-group">
          <label class="form-label">Direção</label>
          <select id="q-direcao">
            <option ${direcao==='Carla → Matheus'?'selected':''}>Carla → Matheus</option>
            <option ${direcao==='Matheus → Carla'?'selected':''}>Matheus → Carla</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="confirmarQuitacao('${mesId}')">Confirmar quitação ✓</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
}

function confirmarQuitacao(mesId) {
  const valor = parseFloat(document.getElementById('q-valor').value);
  const data = document.getElementById('q-data').value;
  const direcao = document.getElementById('q-direcao').value;
  const dataBR = data.split('-').reverse().join('/');
  const q = loadQuitacoes();
  q[mesId] = { valor, data: dataBR, direcao };
  saveQuitacoes(q);
  closeModal();
  render();
}

function removerQuitacao(mesId) {
  if (!confirm('Remover quitação de ' + DADOS.dados[mesId].label + '?')) return;
  const q = loadQuitacoes();
  delete q[mesId];
  saveQuitacoes(q);
  closeModal();
  render();
}

function closeModal() {
  const m = document.getElementById('cmf-modal');
  if (m) m.remove();
}

// Click fora do modal fecha
document.addEventListener('click', (e) => {
  if (e.target.id === 'cmf-modal') closeModal();
});

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

init();
</script>
</body>
</html>
