<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

.bars-container{display:flex;flex-direction:column;gap:10px;padding:8px 0}

.legend-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}

.acerto-lines b{color:#1c1c1e;font-weight:500}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
.modal-content{background:#fff;width:100%;max-width:500px;border-radius:16px 16px 0 0;padding:24px 20px 36px;max-height:90vh;overflow-y:auto}

.imp-row input,.imp-row select{flex:1;padding:10px 12px;font-size:14px;border:1px solid #d1d1d6;border-radius:8px;background:#fff;color:#1c1c1e;width:auto;min-width:0}

.imp-preview{background:#f2f2f7;border-radius:12px;padding:16px;margin-bottom:16px}
@media (prefers-color-scheme:dark){.imp-preview{background:#2c2c2e}}
.imp-preview-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:14px}
.imp-preview-row.ptotal{font-weight:700;font-size:16px;border-top:1px solid #e5e5ea;padding-top:10px;margin-top:4px}

.file-zone{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px 16px;border:2px dashed #d1d1d6;border-radius:10px;cursor:pointer;color:#8e8e93;font-size:14px;margin-bottom:8px;text-align:center;transition:all .15s}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<body>

<div class="header">
  <div>
    <div class="title">CM Finanças</div>
    <div class="subtitle">Carla &amp; Matheus</div>
  </div>
  <div id="header-right" class="muted"></div>
</div>

<div id="app" class="container">
  <div class="loading">Carregando...</div>
</div>

<nav class="nav">
  <button class="nav-btn active" data-tab="gastos"><span class="nav-icon">⊞</span>Gastos</button>
  <button class="nav-btn" data-tab="historico"><span class="nav-icon">📊</span>Histórico</button>
  <button class="nav-btn" data-tab="acerto"><span class="nav-icon">⚖️</span>Acerto</button>
  <button class="nav-btn" data-tab="importar"><span class="nav-icon">📥</span>Importar</button>
</nav>

<script>
const fmt = v => 'R$ ' + Math.round(v).toLocaleString('pt-BR');
const STORAGE_KEY = 'cmf_quitacoes_v1';

let DADOS = null;
let state = {
  tab: 'gastos',
  mes: null,
  modo: 'variavel',
  detalheCategoria: null,
  modal: null,
  acertoMes: null,
};

// ===== QUITAÇÕES (localStorage) =====
function loadQuitacoes() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    console.error('Erro lendo quitações:', e);
    return {};
  }
}
function saveQuitacoes(q) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(q));
  } catch (e) {
    console.error('Erro salvando quitações:', e);
  }
}

// ===== SUPABASE =====
const SUPA_URL = 'https://anfyhkgcetegvcjxcbqr.supabase.co';
const SUPA_KEY = 'sb_publishable_j_VvBJxc6ZrplZMitRKprQ_JFlSiHqW';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ===== CARREGAR DADOS =====
async function init() {
  try {
    const [{ data: coresRows }, { data: mesesRows }, { data: fixosRows }, { data: itensRows }] = await Promise.all([
      supa.from('cores').select('*'),
      supa.from('meses').select('*'),
      supa.from('fixos').select('*'),
      supa.from('itens').select('*'),
    ]);

    const cores = {};
    for (const r of coresRows) cores[r.categoria] = r.cor;

    const mesesOrdem = mesesRows.map(r => r.mes);

    const dados = {};
    for (const r of mesesRows) {
      dados[r.mes] = {
        label: r.label,
        total: r.total,
        fix: r.fix,
        varr: r.varr,
        carlaPagou: r.carla_pagou,
        carlaDeve: r.carla_deve,
        matheusPagou: r.matheus_pagou,
        matheusDeve: r.matheus_deve,
        saldoCarla: r.saldo_carla,
        cartaoSplit: { matheus: r.cartao_matheus, carla: r.cartao_carla },
        fixos: [],
        cats: [],
      };
    }

    for (const f of fixosRows) {
      if (dados[f.mes]) dados[f.mes].fixos.push({ n: f.nome, p: f.pagante, v: f.valor });
    }

    const catMap = {};
    for (const it of itensRows) {
      const key = it.mes + '|' + it.categoria;
      if (!catMap[key]) catMap[key] = { n: it.categoria, v: 0, c: cores[it.categoria] || '#aaa', itens: [] };
      catMap[key].itens.push({ n: it.nome, p: it.pagante, v: it.valor });
      catMap[key].v += it.valor;
    }

    for (const [key, cat] of Object.entries(catMap)) {
      const mes = key.split('|')[0];
      if (dados[mes]) dados[mes].cats.push(cat);
    }

    for (const mes of mesesOrdem) {
      dados[mes].cats.sort((a, b) => b.v - a.v);
      for (const cat of dados[mes].cats) cat.itens.sort((a, b) => b.v - a.v);
    }

    DADOS = { meses: mesesOrdem, cores, dados };
    state.mes = mesesOrdem[mesesOrdem.length - 1];
    state.acertoMes = state.mes;
    render();
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="empty">Erro carregando dados: ' + e.message + '</div>';
  }
}

// ===== RENDER PRINCIPAL =====
function render() {
  // Nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === state.tab);
  });
  
  const app = document.getElementById('app');
  if (state.tab === 'gastos') app.innerHTML = renderGastos();
  else if (state.tab === 'historico') app.innerHTML = renderHistorico();
  else if (state.tab === 'importar') app.innerHTML = renderImportar();
  else app.innerHTML = renderAcerto();

  // Header right
  const hr = document.getElementById('header-right');
  hr.textContent = state.tab === 'gastos' ? (DADOS.dados[state.mes]?.label || '') : '';

  attachHandlers();
  if (state.tab === 'importar') updatePreview();
}

// ===== TELA 1: GASTOS =====
function renderGastos() {
  const d = DADOS.dados[state.mes];
  if (!d) return '<div class="empty">Mês sem dados.</div>';
  
  const meses = DADOS.meses.map(m => 
    `<button class="month-btn ${m===state.mes?'active':''}" data-mes="${m}">${DADOS.dados[m].label}</button>`
  ).join('');
  
  const totalVarr = d.varr || 1;
  
  let conteudo = '';
  if (state.modo === 'fixo') {
    conteudo = d.fixos.map(f => `
      <div class="item-row">
        <div>
          <div class="item-name">${f.n}</div>
          <div class="item-meta">${f.p}</div>
        </div>
        <div class="item-value">${fmt(f.v)}</div>
      </div>
    `).join('');
  } else {
    conteudo = d.cats.map((c,i) => {
      const pct = Math.round((c.v / totalVarr) * 100);
      return `
        <div class="cat-row" data-cat="${i}">
          <div class="cat-header">
            <span class="cat-name">${c.n}</span>
            <span class="cat-value">${fmt(c.v)}</span>
          </div>
          <div class="cat-bar"><div class="cat-fill" style="width:${pct}%;background:${c.c}"></div></div>
          <div class="cat-pct">${pct}% · ${c.itens.length} ${c.itens.length===1?'item':'itens'}</div>
        </div>
      `;
    }).join('');
  }
  
  return `
    <div class="month-selector">${meses}</div>
    <div class="card card-pad">
      <div class="total-label">Total do mês</div>
      <div class="total-big">${fmt(d.total)}</div>
      <div class="toggle">
        <button class="toggle-btn ${state.modo==='fixo'?'active':''}" data-modo="fixo">Fixo · ${fmt(d.fix)}</button>
        <button class="toggle-btn ${state.modo==='variavel'?'active':''}" data-modo="variavel">Variável · ${fmt(d.varr)}</button>
      </div>
      <div class="muted" style="font-size:12px;text-align:center">
        ${state.modo==='fixo' ? 'proporção 40% Carla / 60% Matheus' : 'proporção 50% / 50%'}
      </div>
    </div>
    <div class="card">${conteudo}</div>
  `;
}

// ===== TELA 2: HISTÓRICO =====
function renderHistorico() {
  const meses = DADOS.meses;
  const maxTotal = Math.max(...meses.map(m => DADOS.dados[m].total));
  
  const bars = meses.map(m => {
    const d = DADOS.dados[m];
    const fixPct = (d.fix / maxTotal) * 100;
    const varPct = (d.varr / maxTotal) * 100;
    return `
      <div class="bar-row">
        <div class="bar-label">${d.label}</div>
        <div class="bar-track">
          <div class="bar-fix" style="width:${fixPct}%"></div>
          <div class="bar-var" style="width:${varPct}%"></div>
          <div class="bar-total">${fmt(d.total)}</div>
        </div>
      </div>
    `;
  }).join('');
  
  // Categorias por mês (% do variável)
  const todasCats = new Set();
  meses.forEach(m => DADOS.dados[m].cats.forEach(c => todasCats.add(c.n)));
  const catsArr = Array.from(todasCats);
  
  const thead = '<tr><th>Categoria</th>' + meses.map(m => `<th>${DADOS.dados[m].label.split('/')[0]}</th>`).join('') + '</tr>';
  
  const tbody = catsArr.map(cat => {
    const cells = meses.map(m => {
      const d = DADOS.dados[m];
      const c = d.cats.find(x => x.n === cat);
      if (!c) return '<td style="color:#8e8e93">–</td>';
      const pct = Math.round((c.v / d.varr) * 100);
      return `<td>${pct}%</td>`;
    }).join('');
    return `<tr><td>${cat}</td>${cells}</tr>`;
  }).join('');
  
  const totals = '<tr><td><b>Total var</b></td>' + meses.map(m => `<td><b>${fmt(DADOS.dados[m].varr)}</b></td>`).join('') + '</tr>';
  
  return `
    <div class="card card-pad">
      <div class="total-label">Histórico</div>
      <div style="font-size:13px;color:#8e8e93;margin-bottom:12px">${DADOS.dados[meses[0]].label} — ${DADOS.dados[meses[meses.length-1]].label}</div>
      <div class="bars-container">${bars}</div>
      <div class="legend">
        <span><span class="legend-dot" style="background:#1a2f6b"></span>Fixo</span>
        <span><span class="legend-dot" style="background:#c9a84c"></span>Variável</span>
      </div>
    </div>
    <div class="card card-pad">
      <div class="total-label">Variável por categoria</div>
      <div style="font-size:12px;color:#8e8e93;margin-bottom:10px">% do total variável por mês</div>
      <div style="overflow-x:auto">
        <table class="heatmap">
          <thead>${thead}</thead>
          <tbody>${tbody}${totals}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ===== TELA 3: ACERTO =====
function calcAcerto() {
  const quitacoes = loadQuitacoes();
  let acumulado = 0;
  const meses = DADOS.meses;
  const result = [];
  
  for (const m of meses) {
    const d = DADOS.dados[m];
    const saldoMes = d.saldoCarla; // negativo = Carla deve a Matheus
    const q = quitacoes[m]; // { valor, data, direcao } se quitado
    const totalAQuitar = saldoMes + acumulado;
    const incorporado = acumulado;
    
    if (q) {
      result.push({mes:m, label:d.label, status:'quitado', saldoMes, incorporado, totalAQuitar, quitacao:q});
      acumulado = 0;
    } else {
      // Se for o último mês, fica pendente. Senão, marca como "incorporado em próximo"
      const isLast = m === meses[meses.length-1];
      if (isLast) {
        result.push({mes:m, label:d.label, status:'pendente', saldoMes, incorporado, totalAQuitar});
      } else {
        result.push({mes:m, label:d.label, status:'incorporado', saldoMes, incorporado, totalAQuitar, proximo:meses[meses.indexOf(m)+1]});
      }
      acumulado = totalAQuitar;
    }
  }
  return result;
}

function renderAcerto() {
  const acerto = calcAcerto();
  
  const rows = acerto.map(a => {
    const lines = a.status === 'pendente' && a.incorporado !== 0 ? `
      <div class="acerto-lines">
        Saldo do mês: <b>${fmt(Math.abs(a.saldoMes))}</b> ${a.saldoMes<0?'Carla→Matheus':'Matheus→Carla'}<br>
        Incorporado: <b>${fmt(Math.abs(a.incorporado))}</b><br>
        Total a quitar: <b>${fmt(Math.abs(a.totalAQuitar))}</b>
      </div>
    ` : '';
    
    let statusTxt = '';
    let statusClass = '';
    let valor = '';
    
    if (a.status === 'quitado') {
      statusTxt = `✓ Quitado em ${a.quitacao.data}`;
      statusClass = 'status-q';
      valor = fmt(Math.abs(a.quitacao.valor)) + ' ' + a.quitacao.direcao;
    } else if (a.status === 'incorporado') {
      statusTxt = `→ Incorporado em ${DADOS.dados[a.proximo].label}`;
      statusClass = 'status-i';
      valor = fmt(Math.abs(a.saldoMes)) + ' ' + (a.saldoMes<0?'C→M':'M→C');
    } else {
      statusTxt = '⏳ Pendente';
      statusClass = 'status-p';
      valor = fmt(Math.abs(a.totalAQuitar)) + ' ' + (a.totalAQuitar<0?'C→M':'M→C');
    }
    
    return `
      <div class="acerto-row" data-mes="${a.mes}">
        <div class="acerto-info">
          <div class="acerto-month">${a.label}</div>
          <div class="acerto-status ${statusClass}">${statusTxt}</div>
          ${lines}
        </div>
        <div class="acerto-val">${valor}</div>
      </div>
    `;
  }).join('');
  
  return `
    <div class="card">
      <div style="padding:16px 16px 8px">
        <div class="total-label">Acerto de contas</div>
        <div style="font-size:12px;color:#8e8e93;margin-top:4px">Toque num mês para detalhes</div>
      </div>
      ${rows}
    </div>
  `;
}

// ===== HANDLERS =====
function attachHandlers() {
  // Nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.onclick = () => { state.tab = b.dataset.tab; render(); };
  });
  
  // Mês
  document.querySelectorAll('.month-btn').forEach(b => {
    b.onclick = () => { state.mes = b.dataset.mes; render(); };
  });
  
  // Toggle modo
  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.onclick = () => { state.modo = b.dataset.modo; render(); };
  });
  
  // Categoria → detalhe
  document.querySelectorAll('.cat-row').forEach(r => {
    r.onclick = () => {
      const idx = parseInt(r.dataset.cat);
      openModalDetalheCat(idx);
    };
  });
  
  // Acerto row → detalhe
  document.querySelectorAll('.acerto-row').forEach(r => {
    r.onclick = () => {
      state.acertoMes = r.dataset.mes;
      openModalAcerto(r.dataset.mes);
    };
  });
}

function abrirQuitacao(mesId) {
  closeModal();
  const acerto = calcAcerto().find(a => a.mes === mesId);
  if (!acerto) return;
  const valor = Math.abs(acerto.totalAQuitar);
  const direcao = acerto.totalAQuitar < 0 ? 'Carla → Matheus' : 'Matheus → Carla';
  const hoje = new Date().toISOString().slice(0,10);
  
  const html = `
    <div class="modal" id="cmf-modal">
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-title">Registrar quitação</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="muted" style="margin-bottom:16px">${DADOS.dados[mesId].label}</div>
        <div class="form-group">
          <label class="form-label">Valor (R$)</label>
          <input type="number" id="q-valor" value="${valor}" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label">Data</label>
          <input type="date" id="q-data" value="${hoje}">
        </div>
        <div class="form-group">
          <label class="form-label">Direção</label>
          <select id="q-direcao">
            <option ${direcao==='Carla → Matheus'?'selected':''}>Carla → Matheus</option>
            <option ${direcao==='Matheus → Carla'?'selected':''}>Matheus → Carla</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="confirmarQuitacao('${mesId}')">Confirmar quitação ✓</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
}

function confirmarQuitacao(mesId) {
  const valor = parseFloat(document.getElementById('q-valor').value);
  const data = document.getElementById('q-data').value;
  const direcao = document.getElementById('q-direcao').value;
  const dataBR = data.split('-').reverse().join('/');
  const q = loadQuitacoes();
  q[mesId] = { valor, data: dataBR, direcao };
  saveQuitacoes(q);
  closeModal();
  render();
}

function removerQuitacao(mesId) {
  if (!confirm('Remover quitação de ' + DADOS.dados[mesId].label + '?')) return;
  const q = loadQuitacoes();
  delete q[mesId];
  saveQuitacoes(q);
  closeModal();
  render();
}

function closeModal() {
  const m = document.getElementById('cmf-modal');
  if (m) m.remove();
}

function getApiKey() { return localStorage.getItem('cmf_claude_key') || ''; }

function onPdfChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  impPdfNome = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    impPdfB64 = ev.target.result.split(',')[1];

    const btn = document.getElementById('imp-process-btn');
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
  };
  reader.readAsDataURL(file);
}

async function processarPDF() {
  const apiKey = getApiKey();
  if (!apiKey) { alert('Configure a chave API Claude primeiro (seção acima).'); return; }
  if (!impPdfB64) { alert('Selecione um PDF primeiro.'); return; }

  const statusEl = document.getElementById('imp-status');
  const btn = document.getElementById('imp-process-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Processando...'; }
  statusEl.innerHTML = '<div class="loading">🤖 Analisando fatura com IA... pode demorar ~30s</div>';

  const prompt = `Analise esta fatura do cartão Itaú Personnalité e extraia TODOS os lançamentos de compras/débitos.

Ignore: pagamentos da fatura, encargos financeiros, IOF e créditos/estornos.

Para cada lançamento retorne:
- n: nome do estabelecimento resumido (max 35 chars, sem datas ou "parcela X/Y")
- v: valor em reais inteiros arredondados (R$ 45,90 → 46; R$ 1.234,56 → 1235)
- cat: exatamente uma destas: ${CATS_VARR.join(' | ')}
- p: sempre "Cartão Conjunto"

Dicas:
Mercado → supermercado, feira, padaria, hortifruti
Restaurante/Bar → restaurante, delivery (iFood/Rappi), bar, café, lanchonete
Saude → farmácia, médico, hospital, clínica, plano de saúde
Assinaturas → Netflix, Spotify, Amazon Prime, Apple, iCloud, Adobe, apps recorrentes
Transporte → posto de gasolina, Uber, 99, metrô, estacionamento, pedágio
Viagem → hotel, passagem aérea, agência de viagem
Roupas/Acessorios → roupa, calçado, bolsa, joia, acessório
Presentes → presente, gift card
Eventos/Jantares → teatro, show, cinema, evento cultural
Utilidades Casa → material de construção, móveis, eletrodoméstico, reforma, decoração
Outros → qualquer outra coisa

Retorne SOMENTE JSON, sem texto antes ou depois:
{"itens":[{"n":"...","v":0,"cat":"...","p":"Cartão Conjunto"}],"totalReais":0}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 8192,
        messages: [{
          role: 'user',
          content: [
            {type:'document', source:{type:'base64', media_type:'application/pdf', data: impPdfB64}},
            {type:'text', text: prompt}
          ]
        }]
      })
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const text = data.content[0].text;
    const m = text.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('Resposta inesperada: ' + text.slice(0, 200));

    const parsed = JSON.parse(m[0]);
    impItens = (parsed.itens || [])
      .filter(it => it.v > 0)
      .map(it => ({
        n:   String(it.n || '').slice(0, 50),
        cat: CATS_VARR.includes(it.cat) ? it.cat : 'Outros',
        v:   Math.round(Math.abs(it.v)),
        p:   'Cartão Conjunto',
      }));

    const totalReais = parsed.totalReais || impItens.reduce((s, it) => s + it.v, 0);
    statusEl.innerHTML = `<div style="color:#34c759;font-size:14px;padding:6px 0">✓ ${impItens.length} itens extraídos · Total da fatura: ${fmt(totalReais)}</div>`;

    document.getElementById('imp-itens-list').innerHTML = renderItensList();

    const cm = document.getElementById('imp-split-matheus');
    const cc = document.getElementById('imp-split-carla');
    const ct = document.getElementById('imp-split-total');
    if (cm) cm.value = totalReais;
    if (cc) cc.value = 0;
    if (ct) ct.textContent = fmt(totalReais);

    updatePreview();
  } catch (e) {
    statusEl.innerHTML = `<div style="color:#ff3b30;font-size:14px;padding:6px 0">❌ Erro: ${e.message}</div>`;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🤖 Processar fatura com IA'; }
  }
}

function onSplitChange(who) {
  const total = impItens.reduce((s, it) => s + (it.v||0), 0);
  const ct = document.getElementById('imp-split-total');
  if (ct) ct.textContent = fmt(total);
  if (who === 'matheus') {
    const m = parseInt(document.getElementById('imp-split-matheus')?.value) || 0;
    const cc = document.getElementById('imp-split-carla');
    if (cc) cc.value = Math.max(0, total - m);
  } else {
    const c = parseInt(document.getElementById('imp-split-carla')?.value) || 0;
    const cm = document.getElementById('imp-split-matheus');
    if (cm) cm.value = Math.max(0, total - c);
  }
  updatePreview();
}

// -- Preview --
function calcImpTotals() {
  const fix  = (impFixos || []).reduce((s, f)  => s + (f.v||0),  0);
  const all  = [...impItens, ...impAvulsos];
  const varr = all.reduce((s, it) => s + (it.v||0), 0);
  const cartaoMatheus = parseInt(document.getElementById('imp-split-matheus')?.value) || 0;
  const cartaoCarla   = parseInt(document.getElementById('imp-split-carla')?.value)   || 0;
  const carlaPagou    = (impFixos||[]).filter(f=>f.p==='Carla').reduce((s,f)=>s+(f.v||0),0)
                      + all.filter(it=>it.p==='Carla').reduce((s,it)=>s+(it.v||0),0)
                      + cartaoCarla;
  const matheusPagou  = (impFixos||[]).filter(f=>f.p==='Matheus').reduce((s,f)=>s+(f.v||0),0)
                      + all.filter(it=>it.p==='Matheus').reduce((s,it)=>s+(it.v||0),0)
                      + cartaoMatheus;
  const carlaDeve   = Math.round(fix * 0.4 + varr * 0.5);
  const matheusDeve = Math.round(fix * 0.6 + varr * 0.5);
  const saldoCarla  = carlaPagou - carlaDeve;
  return {fix, varr, total: fix+varr, carlaPagou, matheusPagou, carlaDeve, matheusDeve, saldoCarla, cartaoMatheus, cartaoCarla};
}

function updatePreview() {
  const el = document.getElementById('imp-preview');
  if (!el) return;
  const t = calcImpTotals();
  const cor = t.saldoCarla >= 0 ? '#34c759' : '#ff3b30';
  const saldoTxt = t.saldoCarla >= 0
    ? `Carla recebe ${fmt(t.saldoCarla)} do Matheus`
    : `Carla deve ${fmt(-t.saldoCarla)} ao Matheus`;
  el.innerHTML = `
    <div class="imp-preview-row"><span class="muted">Fixos (40/60)</span><span>${fmt(t.fix)}</span></div>
    <div class="imp-preview-row"><span class="muted">Variável (50/50)</span><span>${fmt(t.varr)}</span></div>
    <div class="imp-preview-row ptotal"><span>Total</span><span>${fmt(t.total)}</span></div>
    <div style="height:10px"></div>
    <div class="imp-preview-row"><span class="muted">Carla pagou / deveria</span><span>${fmt(t.carlaPagou)} / ${fmt(t.carlaDeve)}</span></div>
    <div class="imp-preview-row"><span class="muted">Matheus pagou / deveria</span><span>${fmt(t.matheusPagou)} / ${fmt(t.matheusDeve)}</span></div>
    <div class="imp-preview-row" style="color:${cor};font-weight:600;padding-top:8px;font-size:15px">${saldoTxt}</div>`;
}

// -- Salvar --
async function salvarMesSupabase() {
  const mesEl = document.getElementById('imp-mes');
  if (!mesEl?.value) { alert('Selecione o mês.'); return; }
  const mesId  = mesEl.value;
  const mesIdx = MESES_ABBR.indexOf(mesId);
  const label  = MESES_LBL[mesIdx] || mesId;
  const t = calcImpTotals();
  if (t.total === 0) { alert('Nenhum valor para salvar. Preencha os dados.'); return; }

  const existente = DADOS?.meses.includes(mesId);
  if (existente && !confirm(`⚠️ O mês ${label} já existe. Sobrescrever tudo?`)) return;

  const saveBtn = document.getElementById('imp-save-btn');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ Salvando...'; }

  try {
    if (existente) {
      const {error} = await supa.from('meses').delete().eq('mes', mesId);
      if (error) throw error;
    }

    const {error: e1} = await supa.from('meses').insert({
      mes: mesId, label,
      total: t.total, fix: t.fix, varr: t.varr,
      carla_pagou: t.carlaPagou, carla_deve: t.carlaDeve,
      matheus_pagou: t.matheusPagou, matheus_deve: t.matheusDeve,
      saldo_carla: t.saldoCarla,
      cartao_matheus: t.cartaoMatheus, cartao_carla: t.cartaoCarla,
    });
    if (e1) throw e1;

    const fixosRows = (impFixos||[]).filter(f => f.n && f.v > 0).map(f => ({
      mes: mesId, nome: f.n, pagante: f.p, valor: f.v,
    }));
    if (fixosRows.length) {
      const {error: e2} = await supa.from('fixos').insert(fixosRows);
      if (e2) throw e2;
    }

    const todosItens = [...impItens, ...impAvulsos].filter(it => it.n && it.v > 0);
    if (todosItens.length) {
      const {error: e3} = await supa.from('itens').insert(
        todosItens.map(it => ({mes: mesId, categoria: it.cat, nome: it.n, pagante: it.p, valor: it.v}))
      );
      if (e3) throw e3;
    }

    alert(`✅ ${label} salvo!\n${fixosRows.length} fixos · ${todosItens.length} itens variáveis`);

    impItens   = [];
    impAvulsos = [];
    impPdfB64  = null;
    impPdfNome = '';
    await init();
    state.tab = 'gastos';
    state.mes = mesId;
    render();
  } catch (e) {
    alert('❌ Erro ao salvar: ' + (e.message || JSON.stringify(e)));
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 Salvar no Supabase'; }
  }
}

// -- Render aba --
function getMesDefault() {
  if (!DADOS || !DADOS.meses.length) return MESES_ABBR[0];
  const idx = MESES_ABBR.indexOf(DADOS.meses[DADOS.meses.length - 1]);
  return MESES_ABBR[Math.min(idx + 1, 11)];
}

function renderImportar() {
  if (!impFixos) impFixos = FIXOS_DEFAULT.map(f => ({...f}));
  const apiKey     = getApiKey();
  const mesDefault = getMesDefault();
  const mesOpts    = MESES_ABBR.map((m, i) =>
    `<option value="${m}" ${m===mesDefault?'selected':''}>${MESES_LBL[i]}</option>`).join('');
  const splitTotal = impItens.reduce((s, it) => s + (it.v||0), 0);

  return `
    <div class="card card-pad" style="margin-bottom:12px">
      <div class="imp-section-title">🔑 Chave API Claude</div>
      <div class="imp-row">
        <input type="password" id="imp-apikey" placeholder="${apiKey ? '(chave configurada — deixe em branco para manter)' : 'sk-ant-api03-...'}" autocomplete="off">
        <button id="imp-save-key" class="btn btn-secondary" style="width:auto;padding:10px 16px;margin:0;flex-shrink:0" onclick="salvarApiKey()">Salvar</button>
      </div>
      ${apiKey
        ? '<div style="color:#34c759;font-size:12px;margin-top:4px">✓ Chave configurada</div>'
        : '<div style="color:#ff9500;font-size:12px;margin-top:4px">⚠️ Configure a chave para processar PDF com IA</div>'}
    </div>

    <div class="card card-pad" style="margin-bottom:12px">
      <div class="imp-section-title">📅 Mês a importar</div>
      <select id="imp-mes">${mesOpts}</select>
    </div>

    <div class="card card-pad" style="margin-bottom:12px">
      <div class="imp-section-title">💳 Fatura do cartão (PDF)</div>
      <label for="imp-pdf">
        <div class="file-zone ${impPdfNome ? 'has-file' : ''}" id="imp-pdf-zone">
          ${impPdfNome ? '📄 ' + escHtml(impPdfNome) : '📂 Toque para escolher o PDF da fatura'}
        </div>
      </label>
      <input type="file" id="imp-pdf" accept=".pdf,application/pdf" style="display:none" onchange="onPdfChange(event)">
      <button id="imp-process-btn" class="btn btn-primary" onclick="processarPDF()" ${!impPdfB64 ? 'disabled style="opacity:.5"' : ''}>
        🤖 Processar fatura com IA
      </button>
      <div id="imp-status"></div>

      <div style="margin-top:16px">
        <div class="imp-section-title">Itens da fatura</div>
        <div id="imp-itens-list">${renderItensList()}</div>
      </div>

      <div style="margin-top:16px">
        <div class="imp-section-title">Split do cartão conjunto</div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0 10px;font-size:13px">
          <span class="muted">Total da fatura:</span>
          <span id="imp-split-total" style="font-weight:600">${fmt(splitTotal)}</span>
        </div>
        <div class="imp-row">
          <label style="font-size:14px;min-width:80px;flex-shrink:0;display:flex;align-items:center">Matheus</label>
          <input type="number" id="imp-split-matheus" value="${splitTotal}" placeholder="0" oninput="onSplitChange('matheus')">
        </div>
        <div class="imp-row">
          <label style="font-size:14px;min-width:80px;flex-shrink:0;display:flex;align-items:center">Carla</label>
          <input type="number" id="imp-split-carla" value="0" placeholder="0" oninput="onSplitChange('carla')">
        </div>
      </div>
    </div>

    <div class="card card-pad" style="margin-bottom:12px">
      <div class="imp-section-title">📋 Fixos do mês</div>
      <div id="imp-fixos-list">${renderFixosList()}</div>
      <button class="btn btn-secondary" style="margin-top:6px" onclick="addFixo()">+ Adicionar fixo</button>
    </div>

    <div class="card card-pad" style="margin-bottom:12px">
      <div class="imp-section-title">➕ Gastos avulsos (fora da fatura)</div>
      <div id="imp-avulsos-list">${renderAvulsosList()}</div>
      <button class="btn btn-secondary" style="margin-top:6px" onclick="addAvulso()">+ Adicionar gasto avulso</button>
    </div>

    <div class="card card-pad" style="margin-bottom:12px">
      <div class="imp-section-title">📊 Resumo do mês</div>
      <div class="imp-preview" id="imp-preview">
        <div class="muted" style="font-size:13px;text-align:center">Preencha os valores para ver o resumo</div>
      </div>
      <button id="imp-save-btn" class="btn btn-primary" style="background:#34c759" onclick="salvarMesSupabase()">
        💾 Salvar no Supabase
      </button>
    </div>`;
}

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

init();
</script>
</body>
</html>
